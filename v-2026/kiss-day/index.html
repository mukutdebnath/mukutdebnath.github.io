<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kiss Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Handlee&family=Playpen+Sans+Thai:wght@100..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles.css" />
</head>

<body class="theme-kiss">
    <div class="signature-wrap">
        <div class="signature-text header-text">from dumbo...</div>
    </div>
    <div class="carousel-container">
        <div class="date-header">FEBRUARY 13, 2026</div>
        <hr />

        <section class="slide active" id="slide-1">
            <div class="hero-gif-frame">
                <img id="hero-gif" src="" alt="Kiss Day Intro">
            </div>
            <h1>Happy Kiss Day!</h1>
            <p>And here is the wrap-up to the week! 😘</p>
            <div class="nav-buttons" style="display: flex; justify-content: center;">
                <button onclick="goToSlide(2)">Lessgo!</button>
            </div>
        </section>

        <section class="slide" id="slide-2">
            <div class="photo-board">
                <script>
                    // This loop creates 9 photo items to save HTML clutter
                    for (let i = 1; i <= 8; i++) {
                        document.write(`
                        <div class="photo-item">
                            <img src="images/photo${i}.jpg" alt="Kiss Day ${i}">
                            <div class="kiss-mark" onclick="openKissPopup(${i})">💋</div>
                        </div>
                    `);
                    }
                </script>
            </div>
            <div class="nav-buttons" style="display: flex; justify-content: center;">
                <button onclick="goToSlide(1)">Start Over</button>
            </div>
        </section>

        <div id="kiss-thought-bubble" class="hidden">
            <div class="bubble-inner">
                <div class="bubble-tail"></div>

                <div class="bubble-columns">

                    <div class="col-left">
                        <img id="popup-gif" src="" alt="Kiss Memory">
                    </div>

                    <div class="col-right">
                        <p id="popup-text"></p>
                    </div>
                </div>
            </div>
        </div>

        <a href="../index.html" class="back-link">🏠 Valentine's Week</a>
    </div>
    <div class="signature-wrap">
        <div class="signature-text footer-text">...to his madam</div>
    </div>
    <script>
        let popupTimer;
        const bubble = document.getElementById('kiss-thought-bubble');
        // 1. DATA REPOSITORY
        const heroGifs = [
            'tj-1.gif', 'tj-2.gif', 'tj-3.gif','tj-4.gif',
            'tj-5.gif', 
            'ls-1.gif', 'ls-2.gif', 
            'wall-e-robot.gif'
        ];

        const randomPopupGifs = [
            'b-1.gif', 'b-2.gif', 'b-3.gif', 'b-4.gif',
            'b-5.gif', 'b-6.gif', 'b-7.gif', 'b-8.gif',
            'b-9.gif', 'b-10.gif', 'b-11.gif', 'b-12.gif'
        ];

        // Data for each of the 9 popups
        const kissData = {
            1: "Lunch!!! Starter e pet bhoira gesloga but khawon bhala hoile o amar favourite food toh tui e 👉🏻👈🏻",
            2: "As you always say and like to do, amar gallery tor photo te bhorti kora, onek space baaki kintu ohono! 😊",
            3: "Look at this selfie!! Such an amazing view 🥹! But my favourite view will always be you 🌚",
            4: "'Madam aap bohot sundar dikh rahi ho!' - remember what the waitress said, yes amar madam shobcheye shundor 🫠",
            5: "Selfie after the lunch, this photo will always remind me of the special moment, & to recreate it dabaya! 😁",
            6: "Flower shopping!!! First time I saw so many varieties of roses 🫠 I know you liked the flowers I chose for you 🌚",
            7: "And the last selfie, how did you feel holding my gorom hands? Shotti koira ko ... 😏",
            8: "And the last few moments at Cakes & Buns! Thank you for an amazing week, untill next time I will miss you 💞",
            9: "Love you to bits!"
        };

        // 2. INITIALIZATION
        window.onload = () => {
            // Pick Random Hero
            const randomHero = heroGifs[Math.floor(Math.random() * heroGifs.length)];
            document.getElementById('hero-gif').src = 'gifs/' + randomHero;

            // Randomize Board Positions
            document.querySelectorAll('.photo-item').forEach(item => {
                const r = (Math.random() * 16 - 8).toFixed(2); // -8 to +8 deg
                const x = (Math.random() * 20 - 10).toFixed(0); // -10 to +10 px
                const y = (Math.random() * 20 - 10).toFixed(0);

                item.style.setProperty('--r', `${r}deg`);
                item.style.setProperty('--x', `${x}px`);
                item.style.setProperty('--y', `${y}px`);
            });
        };

        // 3. NAVIGATION
        function goToSlide(n) {
            document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
            document.getElementById('slide-' + n).classList.add('active');
        }

        // 4. POPUP ENGINE
        // function openKissPopup(id, triggerElement) {
        //     const data = kissData[id];

        //     // Populating Content
        //     document.getElementById('popup-gif').src = 'images/' + data.gif;
        //     document.getElementById('popup-text').innerText = data.text;

        //     // Optional: Position the bubble relative to the tap! (Advanced refinement)
        //     // The previous CSS centers it on the whole grid, which is fine, but you could 
        //     // position it right above 'triggerElement' if you calculate offsets.
        //     // For now, centering it over the whole page is less cluttery and easier.

        //     // Reveal and start timer
        //     bubble.classList.remove('closing');
        //     bubble.classList.add('active');

        //     // Reset Timer
        //     clearTimeout(popupTimer);
        //     popupTimer = setTimeout(closeKissPopup, 4000);
        // }
        function openKissPopup(id) {
            const bubble = document.getElementById('kiss-thought-bubble');

            // Pick a random GIF from the pool
            const randomGif = randomPopupGifs[Math.floor(Math.random() * randomPopupGifs.length)];
            // Get the static text for this specific photo
            const staticText = kissData[id];

            // Injecting Content
            document.getElementById('popup-gif').src = 'gifs/' + randomGif;
            document.getElementById('popup-text').innerText = staticText;

            // Show Bubble
            bubble.classList.remove('closing');
            bubble.classList.add('active');

            // Auto-close logic
            clearTimeout(popupTimer);
            popupTimer = setTimeout(closeKissPopup, 4500);
        }

        function closeKissPopup() {
            // Add closing animation first
            bubble.classList.add('closing');
            // Then hide after animation ends (0.3s)
            setTimeout(() => {
                bubble.classList.remove('active');
                bubble.classList.remove('closing');
            }, 300);
        }

        // 3. TAP OUTSIDE TO CLOSE
        document.addEventListener('click', (event) => {
            // If the bubble is active AND the user tapped outside the bubble and the kiss mark
            if (bubble.classList.contains('active') &&
                !bubble.contains(event.target) &&
                !event.target.classList.contains('kiss-mark')) {
                closeKissPopup();
            }
        });
    </script>
</body>

</html>
