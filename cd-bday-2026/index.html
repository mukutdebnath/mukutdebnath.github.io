<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 24!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="confetti-canvas"></canvas>
    <section id="hero" class="full-screen">
        <div class="hero-content">
            <h1 class="reveal-text">Happy Birthday! ✨</h1>
            <p class="fade-in-delayed">A journey of us, made just for you.</p>
            <div class="scroll-indicator">
                <span>Scroll to begin</span>
                <div class="mouse">
                    <div class="wheel"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="timeline-container"></div>

    <section id="final-reveal" class="full-screen">
        <div class="reveal-header">
            <h3 class="reveal-text" style="font-size: 1.75rem;">One last thing...</h3>
            <div class="scratch-indicator">
                <span>Scratch crowww</span>
            </div>
        </div>

        <div class="scratch-container">
            <img src="images/cd-sketch.jpeg" id="sketch-photo" alt="My Sketch for You">

            <canvas id="scratch-canvas"></canvas>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
